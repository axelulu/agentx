<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background: subtle top-lit gradient for depth -->
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#181f30"/>
      <stop offset="100%" stop-color="#0c1019"/>
    </linearGradient>

    <!-- X stroke gradient: refined blue → indigo -->
    <linearGradient id="xGrad" x1="0.15" y1="0.15" x2="0.85" y2="0.85">
      <stop offset="0%" stop-color="#4d90ff"/>
      <stop offset="100%" stop-color="#8257f5"/>
    </linearGradient>

    <!-- Drop shadow for X — depth, not glow -->
    <filter id="xShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="shadow"/>
      <feOffset dx="0" dy="6" result="offsetShadow"/>
      <feFlood flood-color="#000000" flood-opacity="0.4"/>
      <feComposite in2="offsetShadow" operator="in" result="colorShadow"/>
      <feMerge>
        <feMergeNode in="colorShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Top edge highlight — premium glass feel -->
    <linearGradient id="topLight" x1="0.5" y1="0" x2="0.5" y2="0.35">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Very subtle warm-up in top-left corner -->
    <radialGradient id="cornerWarm" cx="0.25" cy="0.2" r="0.5">
      <stop offset="0%" stop-color="#1e2d4a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1e2d4a" stop-opacity="0"/>
    </radialGradient>

    <!-- Squircle clip (inset ~100px for macOS HIG) -->
    <clipPath id="squircleClip">
      <rect x="100" y="100" width="824" height="824" rx="184" ry="184"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#squircleClip)">
    <rect x="100" y="100" width="824" height="824" fill="url(#bg)"/>
    <!-- Subtle corner warmth for depth -->
    <rect x="100" y="100" width="824" height="824" fill="url(#cornerWarm)"/>
    <!-- Top highlight -->
    <rect x="100" y="100" width="824" height="412" fill="url(#topLight)"/>
  </g>

  <!-- Border: thin, precise -->
  <rect x="101" y="101" width="822" height="822" rx="183.5" ry="183.5"
        fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.75"/>

  <!-- X with drop shadow -->
  <g filter="url(#xShadow)">
    <line x1="352" y1="352" x2="672" y2="672"
          stroke="url(#xGrad)" stroke-width="76" stroke-linecap="round"/>
    <line x1="672" y1="352" x2="352" y2="672"
          stroke="url(#xGrad)" stroke-width="76" stroke-linecap="round"/>
  </g>
</svg>
