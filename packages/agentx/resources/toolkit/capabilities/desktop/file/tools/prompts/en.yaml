meta:
  name: desktop.file
  version: "1.0"
  description: File operation tools for the desktop workspace

tools:
  - name: file_read
    description: >
      Read the contents of a file at the given path.
      Returns the file content, size, and whether the file exists.
      Use this tool to inspect files before modifying them.
    category: file
    input_schema:
      type: object
      properties:
        file_path:
          type: string
          description: >
            Path to the file to read, relative to the workspace root.
      required:
        - file_path

  - name: file_create
    description: >
      Create a new file with the given content.
      Creates parent directories automatically if they don't exist.
      Use this to write new files; use file_rewrite to modify existing files.
    category: file
    input_schema:
      type: object
      properties:
        file_path:
          type: string
          description: >
            Path where the file will be created, relative to the workspace root.
        content:
          type: string
          description: The full content to write to the file.
      required:
        - file_path
        - content

  - name: file_rewrite
    description: >
      Edit an existing file. The file must already exist — use file_create for new files.
      Always read the file first with file_read before editing.
      Supports two modes:
      1. Full rewrite: provide `content` to replace the entire file.
      2. Surgical edits: provide `edits` (array of {old_text, new_text}) for targeted
         search-and-replace changes. Each old_text must match exactly once.
      Prefer `edits` for small changes — it saves tokens and reduces risk of losing content.
    category: file
    input_schema:
      type: object
      properties:
        file_path:
          type: string
          description: >
            Path to the existing file to edit, relative to the workspace root.
        content:
          type: string
          description: >
            Full content to replace the file with. Use this OR edits, not both.
        edits:
          type: array
          description: >
            List of search-and-replace edits. Each old_text must appear exactly once
            in the file. Edits are applied sequentially. Prefer this for small changes.
          items:
            type: object
            properties:
              old_text:
                type: string
                description: Exact text to find (must be unique in the file)
              new_text:
                type: string
                description: Replacement text
            required:
              - old_text
              - new_text
      required:
        - file_path
