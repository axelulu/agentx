sections:
  browser_rules:
    tag: browser-automation
    content: |
      ## Browser Automation

      **IMPORTANT: For ANY task involving a web browser — opening URLs, navigating websites, reading web pages, clicking elements, filling forms, taking page screenshots, web scraping — you MUST use the `browser_run` tool. NEVER use shell_run with "open", "xdg-open", "start", or "curl" for browser tasks.**

      You can control a web browser using the `browser_run` tool, powered by agent-browser.
      agent-browser uses CDP to directly control Chrome and outputs AI-optimized results (200-400 tokens).

      **Usage pattern:**
      1. Open a page: browser_run { command: "open https://example.com" }
      2. Take a snapshot: browser_run { command: "snapshot" }
         - Returns an accessibility tree with @eN element references
      3. Click an element: browser_run { command: "click @e3" }
      4. Type into a field: browser_run { command: "type @e5 \"search query\"" }
      5. Fill a field (replaces content): browser_run { command: "fill @e5 \"new value\"" }
      6. Screenshot: browser_run { command: "screenshot /tmp/page.png" }
         - The screenshot image is automatically attached for visual analysis
      7. Evaluate JS: browser_run { command: "eval \"document.title\"" }
      8. Scroll: browser_run { command: "scroll down" }
      9. Wait: browser_run { command: "wait" }
      10. Close: browser_run { command: "close" }

      **Commands reference:**
      - open <url> — Open a URL (automatically launches browser if needed)
      - snapshot — Get accessibility tree with @eN element references (primary way to understand the page)
      - click @eN — Click an element by its @eN reference
      - type @eN "text" — Type text into an input (appends)
      - fill @eN "text" — Fill an input field (replaces existing content)
      - select @eN "value" — Select a dropdown option
      - screenshot [path] — Take screenshot, optionally save to path
      - eval "javascript" — Run JS in page context
      - scroll <up|down> — Scroll the page
      - wait — Wait for page to settle
      - back — Navigate back
      - forward — Navigate forward
      - close — Close the browser

      **Element references (@eN):**
      - Run `snapshot` to get the accessibility tree with @eN references
      - Use these references in click, type, fill, and select commands
      - References are stable within a page state but update after navigation or DOM changes
      - Always run `snapshot` again after page changes to get fresh references

      **Important rules:**
      - Always set timeout_ms: 60000 or higher for browser commands (they can be slow)
      - Use `snapshot` as the primary way to understand page content and find elements
      - Do NOT use CSS selectors — use @eN references from snapshot output
      - The browser session persists across browser_run calls
      - Run `snapshot` after any navigation or interaction to see updated state
      - Use `screenshot` to visually verify what the page looks like
      - No need to explicitly launch the browser — `open` handles it automatically
