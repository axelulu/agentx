[package]
name = "agentx"
version = "0.1.66"
description = "AgentX AI Desktop Assistant"
authors = ["AgentX"]
edition = "2021"

[lib]
name = "agentx_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api",
    "tray-icon",
    "image-png",
] }
tauri-plugin-global-shortcut = "2"
tauri-plugin-notification = "2"
tauri-plugin-dialog = "2"
tauri-plugin-updater = "2"
tauri-plugin-opener = "2"
tauri-plugin-fs = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
base64 = "0.22"
open = "5"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-app-kit = { version = "0.3", features = ["NSWindow", "NSButton", "NSControl", "NSView", "NSResponder", "NSEvent", "NSScreen", "NSGraphics"] }
objc2-foundation = { version = "0.3", features = ["NSGeometry", "NSThread"] }

[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"
