name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release"
        required: false
        default: true
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          echo "Verifying pkg-config can find glib-2.0:"
          pkg-config --libs --cflags glib-2.0
          echo "PKG_CONFIG_PATH candidates:"
          find /usr -name 'glib-2.0.pc' 2>/dev/null

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/agentx/src-tauri -> target
          key: ${{ matrix.platform }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter "agentx^..." build
        env:
          PKG_CONFIG_PATH: ${{ matrix.platform == 'linux' && '/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig' || '' }}

      - name: Build Tauri app (${{ matrix.platform }})
        run: pnpm --filter agentx build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_CONFIG_PATH: ${{ matrix.platform == 'linux' && '/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig' || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            packages/agentx/src-tauri/target/release/bundle/**/*.dmg
            packages/agentx/src-tauri/target/release/bundle/**/*.app.tar.gz
            packages/agentx/src-tauri/target/release/bundle/nsis/*.exe
            packages/agentx/src-tauri/target/release/bundle/**/*.AppImage
            packages/agentx/src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -R artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          generate_release_notes: true
          append_body: true
          body: |

            ## Installation

            ### macOS
            1. Download the `.dmg` file for your architecture (`arm64` for Apple Silicon, `x64` for Intel)
            2. Open the `.dmg` and drag **AgentX** to Applications
            3. **Important**: The app is not yet code-signed. macOS will show "AgentX is damaged" error. Run this command to fix it:
               ```bash
               xattr -cr /Applications/AgentX.app
               ```
            4. Open AgentX from Applications

            > Alternatively, you can right-click the app → Open → click "Open" in the dialog.

            ### Windows
            Download and run the `.exe` installer.

            ### Linux
            ```bash
            chmod +x AgentX-*.AppImage
            ./AgentX-*.AppImage
            ```
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
