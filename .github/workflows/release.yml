name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release"
        required: false
        default: true
        type: boolean
      tag:
        description: "Tag to release (e.g. v0.1.72). Required for workflow_dispatch."
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/agentx/src-tauri -> target
          key: mac

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter "agentx^..." build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Build Tauri app
        run: pnpm --filter agentx build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: |
            packages/agentx/src-tauri/target/release/bundle/**/*.dmg
            packages/agentx/src-tauri/target/release/bundle/**/*.app.tar.gz
            packages/agentx/src-tauri/target/release/bundle/**/*.app.tar.gz.sig
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \) -exec mv {} dist/ \;
          echo "Release artifacts:"
          ls -lh dist/

      - name: Generate latest.json for updater
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          NOTES="Release ${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Start with base JSON
          JSON=$(jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: {}}')

          # Add macOS platform if sig file exists
          if [ -f "dist/AgentX.app.tar.gz.sig" ]; then
            SIG=$(cat "dist/AgentX.app.tar.gz.sig")
            URL="${BASE_URL}/AgentX.app.tar.gz"
            JSON=$(echo "$JSON" | jq \
              --arg sig "$SIG" \
              --arg url "$URL" \
              '.platforms["darwin-aarch64"] = {signature: $sig, url: $url} | .platforms["darwin-x86_64"] = {signature: $sig, url: $url}')
          fi

          echo "$JSON" > dist/latest.json
          echo "Generated latest.json:"
          cat dist/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          generate_release_notes: true
          append_body: true
          body: |

            ## Installation

            ### macOS
            1. Download the `.dmg` file
            2. Open the `.dmg` and drag **AgentX** to Applications
            3. **Important**: The app is not yet code-signed. macOS will show "AgentX is damaged" error. Run this command to fix it:
               ```bash
               xattr -cr /Applications/AgentX.app
               ```
            4. Open AgentX from Applications

            > Alternatively, you can right-click the app → Open → click "Open" in the dialog.
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
