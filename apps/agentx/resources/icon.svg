<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0e1f"/>
    </linearGradient>

    <!-- X stroke gradient: electric blue → violet -->
    <linearGradient id="xGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="45%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Soft outer glow behind the X -->
    <radialGradient id="ambientGlow" cx="0.5" cy="0.5" r="0.38">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <!-- Center intersection glow -->
    <radialGradient id="centerGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#c7d2fe" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter for X strokes -->
    <filter id="xGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.39
                0 0 0 0 0.40
                0 0 0 0 0.95
                0 0 0 0.5 0" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Squircle clip -->
    <clipPath id="squircleClip">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#squircleClip)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
    <!-- Subtle ambient color spots -->
    <circle cx="280" cy="260" r="380" fill="#1e3a5f" opacity="0.12"/>
    <circle cx="770" cy="790" r="320" fill="#2d1b69" opacity="0.10"/>
  </g>

  <!-- Faint border -->
  <rect x="3" y="3" width="1018" height="1018" rx="226" ry="226"
        fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- Ambient glow behind X -->
  <circle cx="512" cy="512" r="390" fill="url(#ambientGlow)"/>

  <!-- X with glow -->
  <g filter="url(#xGlow)">
    <line x1="310" y1="310" x2="714" y2="714"
          stroke="url(#xGrad)" stroke-width="88" stroke-linecap="round"/>
    <line x1="714" y1="310" x2="310" y2="714"
          stroke="url(#xGrad)" stroke-width="88" stroke-linecap="round"/>
  </g>

  <!-- Center glow -->
  <circle cx="512" cy="512" r="68" fill="url(#centerGlow)"/>

  <!-- Bright core -->
  <circle cx="512" cy="512" r="14" fill="#ffffff" opacity="0.95"/>
</svg>
