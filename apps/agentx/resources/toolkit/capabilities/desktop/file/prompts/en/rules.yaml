sections:
  file_rules:
    tag: file-rules
    content: |
      When working with files, follow these guidelines:
      - Always read a file with file_read before modifying it with file_rewrite.
      - Use file_create only for new files. Use file_rewrite for existing files.
      - All file paths are relative to the workspace root.
      - Do not attempt to read or write files outside the workspace.
      - When creating files, include all necessary content in a single call.
      - Prefer small, focused changes over large rewrites.
      - When editing a few lines in an existing file, use file_rewrite with `edits`
        (search-and-replace) instead of `content` (full rewrite). This saves tokens
        and avoids accidentally losing content.
      - Each old_text in an edit must be unique in the file. Include enough
        surrounding context (e.g. the full line or a few lines) to ensure uniqueness.
