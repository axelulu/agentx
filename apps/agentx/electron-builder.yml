appId: com.agentx.desktop
productName: AgentX
publish:
  provider: github
  owner: axelulu
  repo: agentx
directories:
  buildResources: resources
  output: release
files:
  - "out/**/*"
  - "!out/types-node"
  - "!out/types-web"
  - "!node_modules/@workspace/**"
extraResources:
  - from: "resources/icon.png"
    to: "icon.png"
  - from: "resources/toolkit"
    to: "toolkit"
    filter:
      - "**/*"
  - from: "resources/browser"
    to: "browser"
    filter:
      - "**/*"
  - from: "node_modules/playwright-core"
    to: "browser/node_modules/playwright-core"
    filter:
      - "**/*"
asarUnpack:
  - "resources/**"
mac:
  identity: null
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: "${productName}-${version}-${arch}.${ext}"
  category: public.app-category.developer-tools
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: "AgentX needs microphone access for voice input and audio processing."
    NSCameraUsageDescription: "AgentX needs camera access for visual input and image capture."
    NSAppleEventsUsageDescription: "AgentX needs automation access to control other applications on your behalf."
    NSScreenCaptureUsageDescription: "AgentX needs screen recording access to capture screen content for visual context."
    NSAccessibilityUsageDescription: "AgentX needs accessibility access to interact with your desktop and control applications."
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-${version}-setup.${ext}"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: "${productName}-${version}.${ext}"
  category: Development
